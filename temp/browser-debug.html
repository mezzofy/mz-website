<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>i18n Debug Test</title>
</head>
<body>
    <h1>i18n Debug Test</h1>
    <div id="status"></div>

    <script>
        const status = document.getElementById('status');

        async function testTranslations() {
            status.innerHTML = '<p>Loading translation file...</p>';

            try {
                const response = await fetch('http://localhost:8000/i18n/translations/en.json');
                const data = await response.json();

                console.log('Full JSON loaded:', data);

                const checks = [
                    { key: 'management exists', value: !!data.management },
                    { key: 'management.footerCta exists', value: !!data.management?.footerCta },
                    { key: 'management.footerCta.getStarted', value: data.management?.footerCta?.getStarted || 'MISSING' },
                    { key: 'management.footerCta.contactSales', value: data.management?.footerCta?.contactSales || 'MISSING' },
                    { key: 'management.hero.title', value: (data.management?.hero?.title || 'MISSING').substring(0, 50) }
                ];

                let html = '<h2>Translation File Content:</h2><ul>';
                checks.forEach(check => {
                    html += `<li><strong>${check.key}:</strong> ${check.value}</li>`;
                });
                html += '</ul>';

                // Now test the actual i18n library
                html += '<h2>Testing i18n.js Library:</h2>';
                html += '<p>Attempting to load i18n.js and test getTranslation...</p>';

                status.innerHTML = html;

                // Load i18n.js
                const script = document.createElement('script');
                script.src = 'http://localhost:8000/i18n/i18n.js';
                script.onload = async () => {
                    status.innerHTML += '<p>✅ i18n.js loaded successfully</p>';

                    if (window.i18n) {
                        await window.i18n.init();
                        status.innerHTML += '<p>✅ i18n initialized</p>';

                        const translation = window.i18n.getTranslation('management.footerCta.getStarted');
                        status.innerHTML += `<p><strong>Translation result:</strong> ${translation}</p>`;

                        console.log('i18n.translations:', window.i18n.translations);
                    } else {
                        status.innerHTML += '<p>❌ window.i18n not found!</p>';
                    }
                };
                script.onerror = () => {
                    status.innerHTML += '<p>❌ Failed to load i18n.js</p>';
                };
                document.head.appendChild(script);

            } catch (error) {
                status.innerHTML = `<p>❌ Error: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }

        testTranslations();
    </script>
</body>
</html>
